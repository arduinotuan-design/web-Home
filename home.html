        // Hàm tạo âm thanh công tắc cơ (Cụp)
// aaaaaaTạo biến dùng chung
let sharedAudioCtx = null;

function playClickSound() {
    try {
        if (!sharedAudioCtx) {
            sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (sharedAudioCtx.state === 'suspended') {
            sharedAudioCtx.resume();
        }

        const osc = sharedAudioCtx.createOscillator();
        const gain = sharedAudioCtx.createGain();

        // 1. Dùng sóng 'triangle' nghe sẽ giống tiếng cơ khí hơn
        osc.type = 'triangle'; 

        // 2. Tần số khởi đầu cao (800Hz) rồi tụt nhanh xuống (100Hz) 
        // tạo ra tiếng "tạch" sắc nét
        osc.frequency.setValueAtTime(800, sharedAudioCtx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(100, sharedAudioCtx.currentTime + 0.08);

        // 3. Tăng âm lượng lên mức cao (0.8 - 1.0)
        gain.gain.setValueAtTime(0.8, sharedAudioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.01, sharedAudioCtx.currentTime + 0.1);

        osc.connect(gain);
        gain.connect(sharedAudioCtx.destination);

        osc.start();
        osc.stop(sharedAudioCtx.currentTime + 0.1);
        
    } catch (e) {
        console.log("Lỗi âm thanh:", e);
    }
}

function removeV10(i) {
    if(confirm("Xóa lịch này và cập nhật lên thiết bị ngay?")) {
        // 1. Xác định dữ liệu trước khi xóa

        const roomId = itemToRemove.id; 
        const realId = parseInt(roomId) + 2; 

        // 2. Xóa khỏi mảng và lưu bộ nhớ
        listV10.splice(i, 1);
        localStorage.setItem('v10_list_cache', JSON.stringify(listV10));
        
        // 3. QUAN TRỌNG: Gọi loadRoomSchedules() thay vì renderUI()
        // Vì hàm này mới là hàm vẽ cái danh sách lịch đèn
        loadRoomSchedules();

        // 4. GỬI LỆNH ĐỒNG BỘ XUỐNG ESP32 (Gửi đủ 3 gói để xóa hẳn)
        let roomSchedules = listV10.filter(sch => String(sch.id) === String(roomId));
        let combinedData = "";
        
        for (let j = 0; j < 3; j++) {
            if (roomSchedules[j]) {
                combinedData += `id:${realId} ${roomSchedules[j].on} true ${roomSchedules[j].off} false;`;
            } else {
                combinedData += `id:${realId} 00:00 false 00:00 false;`;
            }
        }

        console.log(">>> Đang gửi lệnh xóa triệt để tới V0:", combinedData);

        const key = localStorage.getItem('userPass');
        fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                'action': 'update',
                'pin': 'V0',
                'value': combinedData,
                'device': DEVICE_NAME,
                'key': key
            })
        }).then(r => {
            if(r.ok) console.log("✅ ESP32 đã nhận lệnh xóa: " + combinedData);
        });
    }
}

function sendCmd(pin, value) {
   // playClickSound();
   playClickSound(value === 1 ? 900 : 600);
    const key = localStorage.getItem('userPass');
    const onBtn = document.getElementById(`on-${pin}`);
    const offBtn = document.getElementById(`off-${pin}`);

    // 1. HIỆU ỨNG TỨC THÌ: Nhấn là xanh ngay để cảm giác nút nhạy
    if (onBtn && offBtn) {
        if (value === 1) {
            onBtn.className = "btn btn-on active-on";
            offBtn.className = "btn btn-off";
        } else {
            onBtn.className = "btn btn-on";
            offBtn.className = "btn btn-off active-off";
        }
    }

    // 2. GỬI LỆNH LÊN CHIP
    fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            'action': 'update',
            'pin': pin,
            'value': value,
            'device': DEVICE_NAME,
            'key': key
        })
    }).then(response => {
        if (!response.ok) {
            console.log("Lỗi gửi lệnh cho " + pin);
        }
    }).catch(e => console.log("Mất kết nối mạng"));

    // 3. LOGIC CỘNG DỒN THỜI GIAN (Như bạn muốn: max 2s cho 2 đèn đầu, mỗi đèn sau +0.5s)
    clickCounter++;
    // Tính toán thời gian chờ: Đèn 1,2 chờ 2s. Từ đèn 3 trở đi mỗi đèn + 0.5s
    let waitTime = 2000;
    if (clickCounter > 2) {
        waitTime = 2000 + ((clickCounter - 2) * 500);
    }

    // Xóa hẹn giờ cũ của chân này nếu có
    if (pendingChecks[pin]) clearTimeout(pendingChecks[pin]);

    // Hẹn giờ để kiểm tra xem Chip có thực sự bật/tắt chưa
    pendingChecks[pin] = setTimeout(() => {
        updateStatusOnly(); // Lấy trạng thái thật từ Chip về
        
        clickCounter--;
        if (clickCounter < 0) clickCounter = 0;
        delete pendingChecks[pin];
        
        //console.log(`Đã kiểm tra lại trạng thái ${pin} sau ${waitTime}ms`);
    }, waitTime);
}

function uploadImg(pin) {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => {
            let file = e.target.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = event => {
                let img = new Image();
                img.onload = () => {
                    let canvas = document.createElement('canvas');
                    let ctx = canvas.getContext('2d');
                    let MAX_WIDTH = 500;
                    let scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    let compressedData = canvas.toDataURL('image/jpeg', 0.6); // Nén mạnh hơn
                    try {
                        localStorage.setItem('img_' + pin, compressedData);
                        document.getElementById('img-tag-' + pin).src = compressedData;
                    } catch(e) { alert("Ảnh quá lớn, không thể lưu!"); }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }
